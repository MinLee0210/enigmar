name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Publish the Rust crate to crates.io
  # ──────────────────────────────────────────────────────────────────────────
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests before publishing
        run: cargo test --verbose

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build Python wheels for all platforms
  # ──────────────────────────────────────────────────────────────────────────
  build-wheels:
    name: Build wheels — ${{ matrix.target.os }} (${{ matrix.target.arch }})
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          # Linux
          - { os: linux, arch: x86_64,  runner: ubuntu-latest,  maturin-target: x86_64-unknown-linux-gnu }
          - { os: linux, arch: aarch64, runner: ubuntu-latest,  maturin-target: aarch64-unknown-linux-gnu }
          # macOS
          - { os: macos, arch: x86_64,  runner: macos-13,       maturin-target: x86_64-apple-darwin }
          - { os: macos, arch: arm64,   runner: macos-14,       maturin-target: aarch64-apple-darwin }
          # Windows
          - { os: windows, arch: x86_64, runner: windows-latest, maturin-target: x86_64-pc-windows-msvc }

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target.maturin-target }}
          args: --release --out dist --find-interpreter
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: dist/*.whl

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Build source distribution
  # ──────────────────────────────────────────────────────────────────────────
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/*.tar.gz

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Publish all wheels + sdist to PyPI
  # ──────────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/enigmar
    permissions:
      id-token: write  # for Trusted Publishing (preferred)

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
